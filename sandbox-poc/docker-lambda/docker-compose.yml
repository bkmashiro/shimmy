version: '3.8'
services:
  lambda-sim:
    build: .
    # Lambda-like restrictions
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
      # - seccomp:seccomp-profile.json  # Can add custom profile
    read_only: true
    tmpfs:
      - /tmp:size=512m,mode=1777
    # Resource limits similar to Lambda
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 512M
    # No network (optional, Lambda has network by default)
    # network_mode: none
